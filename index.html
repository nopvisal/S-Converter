<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaForge Pro - Direct Video Downloader & 4K Upscaler</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface2: #1a1a2e;
            --accent: #6c5ce7;
            --text: #e2e2f0;
            --text2: #b0b0c8;
            --text3: #8888a8;
            --border: #2a2a40;
            --danger: #ef4444;
            --success: #22c55e;
            --yt: #ff0033;
            --fb: #1877f2;
            --tt: #ff0050;
            --gradient1: linear-gradient(135deg, #6c5ce7, #a855f7);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.5);
            --radius-lg: 20px;
            --radius-md: 14px;
            --transition: 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.06) 0%, transparent 55%), radial-gradient(ellipse at 70% 60%, rgba(168, 85, 247, 0.05) 0%, transparent 55%);
            z-index: 0;
            pointer-events: none;
            animation: bgShift 20s infinite;
        }

        @keyframes bgShift {

            0%,
            100% {
                transform: translate(0, 0)
            }

            25% {
                transform: translate(1%, -1%)
            }

            50% {
                transform: translate(-0.5%, 1.5%)
            }

            75% {
                transform: translate(1.5%, 0.5%)
            }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px 20px 40px;
        }

        .header {
            text-align: center;
            padding: 30px 20px 20px;
        }

        .header .logo {
            font-size: 2.4rem;
            font-weight: 800;
            background: var(--gradient1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .platform-selector {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 24px;
        }

        .platform-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .platform-btn:hover {
            border-color: var(--accent);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 92, 231, 0.25);
        }

        .platform-btn.active {
            border-color: transparent;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.35);
        }

        .platform-btn.active.yt-active {
            background: var(--yt);
        }

        .platform-btn.active.fb-active {
            background: var(--fb);
        }

        .platform-btn.active.tt-active {
            background: var(--tt);
        }

        .main-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            margin-bottom: 28px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 250px;
            padding: 14px 18px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.1);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient1);
            color: #fff;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-download {
            background: var(--success);
            color: #000;
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }

        .format-selector {
            display: flex;
            gap: 10px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .format-option {
            padding: 10px 18px;
            border-radius: 40px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text2);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .format-option.selected {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.35);
        }

        .result-area {
            display: none;
            margin-top: 20px;
            animation: fadeInUp 0.4s;
        }

        .result-area.show {
            display: block;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .preview-card {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
            background: var(--surface2);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
        }

        .preview-thumb {
            width: 160px;
            height: 90px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--surface3);
        }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 50px;
            color: #fff;
            font-weight: 600;
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 3s forwards;
            box-shadow: var(--shadow-lg);
        }

        .toast.success {
            background: #16a34a;
        }

        .toast.error {
            background: #ef4444;
        }

        .toast.info {
            background: #6366f1;
        }

        @keyframes slideIn {
            from {
                transform: translateX(120%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes fadeOut {
            from {
                transform: translateX(0);
                opacity: 1
            }

            to {
                transform: translateX(120%);
                opacity: 0
            }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .upscaler-section {
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 30px 28px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .drop-zone {
            border: 3px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--surface2);
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(108, 92, 231, 0.05);
        }

        .image-compare {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .image-box {
            flex: 1;
            min-width: 250px;
            background: var(--surface2);
            border-radius: var(--radius-md);
            padding: 14px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .image-box img {
            max-width: 100%;
            max-height: 350px;
            object-fit: contain;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ MediaForge Pro</div>
            <div style="color:var(--text3)">Direct Downloads • 4K Upscaler</div>
        </div>
        <div class="platform-selector">
            <button class="platform-btn active yt-active" id="btnYt">▶️ YouTube <span
                    class="badge">MP4/MP3</span></button>
            <button class="platform-btn" id="btnFb">📘 Facebook <span class="badge">MP4</span></button>
            <button class="platform-btn" id="btnTt">🎵 TikTok <span class="badge">MP4</span></button>
        </div>

        <div class="main-card">
            <h2 style="margin-bottom:18px;display:flex;align-items:center;gap:10px;"><span
                    style="width:10px;height:10px;background:var(--accent);border-radius:50%;animation:pulse-dot 2s infinite;"></span>
                <span id="converterTitle">YouTube Video Converter</span></h2>
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Paste your YouTube link here...">
                <button class="btn btn-primary" id="btnFetch">🔍 Fetch Info</button>
            </div>
            <div class="format-selector" id="formatSelector">
                <button class="format-option selected" data-format="mp4">🎬 MP4</button>
                <button class="format-option" data-format="mp3">🎵 MP3</button>
                <button class="format-option" data-format="mp4_hd">🎬 MP4 HD</button>
            </div>
            <div id="progressBar"
                style="height:6px;background:var(--surface3);border-radius:20px;margin:16px 0;overflow:hidden;display:none;">
                <div id="progressFill" style="height:100%;background:var(--gradient1);width:0%;transition:width 0.5s;">
                </div>
            </div>
            <div class="result-area" id="resultArea">
                <div class="preview-card">
                    <img class="preview-thumb" id="previewThumb" src="" alt="Preview">
                    <div style="flex:1;">
                        <h3 id="previewTitle">Video Title</h3>
                        <p style="font-size:0.8rem;color:var(--text3);" id="previewMeta"></p>
                        <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
                            <button class="btn btn-download" id="btnDownload">⬇️ Download</button>
                            <button class="btn btn-outline" style="padding:10px 18px;font-size:0.85rem;"
                                onclick="clearResult()">✕ Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="upscaler-section">
            <h2 style="margin-bottom:18px;display:flex;align-items:center;gap:10px;"><span
                    style="width:10px;height:10px;background:var(--accent);border-radius:50%;"></span> 🖼️ Image
                Upscaler to 4K</h2>
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('imageInput').click()">
                <div style="font-size:4rem;">📤</div>
                <p><strong>Click to upload</strong> or drag & drop an image</p>
                <p style="font-size:0.8rem;color:var(--text3)">JPG, PNG, WebP — upscales to 4K</p>
                <input type="file" id="imageInput" accept="image/*" hidden>
            </div>
            <div id="imagePreviewArea" style="display:none;">
                <div class="image-compare">
                    <div class="image-box">
                        <div style="font-weight:700;margin-bottom:8px;">📷 Original</div><img id="originalImage">
                        <div id="originalRes" style="font-size:0.75rem;color:var(--text3);margin-top:6px;"></div>
                    </div>
                    <div class="image-box">
                        <div style="font-weight:700;margin-bottom:8px;">✨ Upscaled (4K)</div><img id="upscaledImage">
                        <div id="upscaledRes" style="font-size:0.75rem;color:var(--text3);margin-top:6px;"></div>
                    </div>
                </div>
                <div
                    style="text-align:center;margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="btnUpscale">🚀 Upscale to 4K</button>
                    <button class="btn btn-download" id="btnDownloadUpscaled" style="display:none;">⬇️ Download
                        4K</button>
                    <button class="btn btn-outline" style="padding:10px 18px;" onclick="clearImage()">✕ Clear</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function () {
            // ---------- State ----------
            const state = {
                platform: 'youtube',
                format: 'mp4',
                videoUrl: '',
                streamUrl: null,
                videoTitle: '',
                thumbnail: '',
                originalImage: null,
                upscaled: null
            };

            // ---------- DOM references ----------
            const $ = (s) => document.querySelector(s);
            const $$ = (s) => document.querySelectorAll(s);

            const toastContainer = $('#toastContainer');
            function toast(msg, type = 'info') {
                const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
                toastContainer.appendChild(t);
                setTimeout(() => t.remove(), 3500);
            }

            // ---------- Platform switching ----------
            function switchPlatform(platform) {
                state.platform = platform;
                state.streamUrl = null;
                clearResult(false);
                ['btnYt', 'btnFb', 'btnTt'].forEach(id => $(`#${id}`).classList.remove('active', 'yt-active', 'fb-active', 'tt-active'));
                const placeholders = {
                    youtube: 'Paste YouTube link...',
                    facebook: 'Paste Facebook video link...',
                    tiktok: 'Paste TikTok link...'
                };
                const titles = {
                    youtube: 'YouTube Video Converter',
                    facebook: 'Facebook Video Converter',
                    tiktok: 'TikTok Video Converter'
                };
                $('#videoUrl').placeholder = placeholders[platform];
                $('#converterTitle').textContent = titles[platform];
                if (platform === 'youtube') {
                    $('#btnYt').classList.add('active', 'yt-active');
                    $('#formatSelector').style.display = 'flex';
                    $$('.format-option').forEach(b => b.classList.remove('selected'));
                    $('.format-option[data-format="mp4"]').classList.add('selected');
                    state.format = 'mp4';
                } else {
                    $('#formatSelector').style.display = 'none';
                    if (platform === 'facebook') $('#btnFb').classList.add('active', 'fb-active');
                    else $('#btnTt').classList.add('active', 'tt-active');
                    state.format = 'mp4'; // default for non-YouTube
                }
                $('#resultArea').classList.remove('show');
                $('#videoUrl').value = '';
                $('#videoUrl').focus();
            }
            document.getElementById('btnYt').onclick = () => switchPlatform('youtube');
            document.getElementById('btnFb').onclick = () => switchPlatform('facebook');
            document.getElementById('btnTt').onclick = () => switchPlatform('tiktok');

            // Format buttons
            document.querySelectorAll('.format-option').forEach(btn => {
                btn.addEventListener('click', function () {
                    state.format = this.dataset.format;
                    $$('.format-option').forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    // If we already have video URL, re-fetch with new format
                    if (state.videoUrl && state.platform === 'youtube') {
                        fetchWithCobalt();
                    }
                });
            });

            // Progress bar
            function setProgress(pct) {
                const bar = $('#progressBar');
                bar.style.display = pct > 0 ? 'block' : 'none';
                $('#progressFill').style.width = pct + '%';
                if (pct >= 100) setTimeout(() => { bar.style.display = 'none'; $('#progressFill').style.width = '0%'; }, 600);
            }

            // ---------- Fetch using Cobalt.tools (unified API) ----------
            async function fetchVideoInfo() {
                const url = $('#videoUrl').value.trim();
                if (!url) return toast('Paste a video link first.', 'error');
                // Basic validation of platform
                const isYt = url.includes('youtube.com') || url.includes('youtu.be');
                const isFb = url.includes('facebook.com') || url.includes('fb.watch');
                const isTt = url.includes('tiktok.com');
                if (!isYt && !isFb && !isTt) return toast('URL not recognised. Please paste a YouTube, Facebook or TikTok link.', 'error');

                // Auto-switch platform if needed
                if (isYt && state.platform !== 'youtube') switchPlatform('youtube');
                else if (isFb && state.platform !== 'facebook') switchPlatform('facebook');
                else if (isTt && state.platform !== 'tiktok') switchPlatform('tiktok');

                state.videoUrl = url;
                state.streamUrl = null;
                $('#resultArea').classList.remove('show');
                const fetchBtn = $('#btnFetch');
                fetchBtn.disabled = true;
                fetchBtn.innerHTML = '<span class="spinner"></span> Fetching...';
                setProgress(20);
                try {
                    await fetchWithCobalt();
                    setProgress(100);
                    toast('Ready! Click Download.', 'success');
                } catch (err) {
                    toast('Fetch failed: ' + err.message, 'error');
                    setProgress(0);
                } finally {
                    fetchBtn.disabled = false;
                    fetchBtn.innerHTML = '🔍 Fetch Info';
                }
            }

            async function fetchWithCobalt() {
                const url = state.videoUrl;
                // Build request body based on platform & format
                const body = { url };
                if (state.platform === 'youtube') {
                    if (state.format === 'mp3') {
                        body.downloadMode = 'audio';
                        body.audioFormat = 'mp3';
                    } else if (state.format === 'mp4_hd') {
                        body.videoQuality = '1080';
                        body.downloadMode = 'auto';
                    } else {
                        body.videoQuality = '720';
                        body.downloadMode = 'auto';
                    }
                } else {
                    // Facebook & TikTok: let Cobalt decide best quality
                    body.downloadMode = 'auto';
                }
                body.filenamePattern = 'basic';

                setProgress(40);
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!response.ok) throw new Error('Cobalt API error (status ' + response.status + ')');
                const data = await response.json();
                setProgress(70);
                if (data.status !== 'success' && data.status !== 'redirect') {
                    throw new Error(data.text || 'Could not retrieve download link.');
                }
                const downloadUrl = data.url;
                if (!downloadUrl) throw new Error('No download URL in response.');
                state.streamUrl = downloadUrl;
                state.videoTitle = data.filename || 'video';
                // Thumbnail is not returned by Cobalt – we'll use a placeholder
                state.thumbnail = '';
                // Show result
                $('#previewThumb').src = state.thumbnail || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="160" height="90" fill="%231a1a2e"><text x="80" y="55" text-anchor="middle" fill="%23888" font-size="12">Thumbnail</text></svg>';
                $('#previewTitle').textContent = state.videoTitle;
                const fmtLabel = state.platform === 'youtube' ? (state.format === 'mp3' ? 'MP3' : (state.format === 'mp4_hd' ? 'MP4 HD' : 'MP4')) : 'MP4';
                $('#previewMeta').textContent = `Format: ${fmtLabel} | Platform: ${state.platform}`;
                $('#resultArea').classList.add('show');
                $('#btnDownload').textContent = '⬇️ Download';
            }

            // ---------- Download handler ----------
            async function downloadMedia() {
                if (!state.streamUrl) return toast('No download link. Fetch first.', 'error');
                const url = state.streamUrl;
                const isYouTube = state.platform === 'youtube';
                const isAudio = state.format === 'mp3';

                // For YouTube, we fetch as blob to force download (some browsers might play .mp3/.mp4 otherwise)
                if (isYouTube) {
                    try {
                        toast('Starting download... (large files may take a moment)', 'info');
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('Download request failed');
                        const blob = await response.blob();
                        const a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        const ext = isAudio ? 'mp3' : 'mp4';
                        a.download = (state.videoTitle || 'video') + '.' + ext;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        toast('Download complete!', 'success');
                    } catch (e) {
                        console.warn('Blob download failed, opening direct stream:', e);
                        // Fallback: open in new tab
                        window.open(url, '_blank');
                        toast('Opening direct link in new tab.', 'info');
                    }
                } else {
                    // Facebook & TikTok: the URL from Cobalt is often a direct CDN link that forces download
                    window.open(url, '_blank');
                    toast('Download started / new tab opened.', 'success');
                }
            }

            function clearResult(clearInput = true) {
                state.streamUrl = null;
                $('#resultArea').classList.remove('show');
                $('#previewThumb').src = '';
                $('#previewTitle').textContent = 'Video Title';
                $('#previewMeta').textContent = '';
                $('#btnDownload').textContent = '⬇️ Download';
                if (clearInput) {
                    $('#videoUrl').value = '';
                    state.videoUrl = '';
                }
                setProgress(0);
            }

            // Event listeners
            document.getElementById('btnFetch').onclick = fetchVideoInfo;
            document.getElementById('btnDownload').onclick = downloadMedia;
            $('#videoUrl').addEventListener('keydown', e => { if (e.key === 'Enter') fetchVideoInfo(); });
            window.clearResult = clearResult; // for button onclick

            // ========== IMAGE UPSCALER (4K) ==========
            const dropZone = $('#dropZone');
            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) processImage(file);
                else toast('Please drop an image file.', 'error');
            });
            document.getElementById('imageInput').onchange = e => { if (e.target.files[0]) processImage(e.target.files[0]); };

            function processImage(file) {
                if (file.size > 50 * 1024 * 1024) return toast('Image too large. Max 50MB.', 'error');
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = new Image();
                    img.onload = function () {
                        state.originalImage = { src: e.target.result, width: img.width, height: img.height };
                        state.upscaled = null;
                        $('#originalImage').src = e.target.result;
                        $('#originalRes').textContent = `${img.width} × ${img.height} px`;
                        $('#upscaledImage').src = '';
                        $('#upscaledRes').textContent = 'Not upscaled yet';
                        $('#imagePreviewArea').style.display = 'block';
                        $('#dropZone').style.display = 'none';
                        $('#btnUpscale').style.display = 'inline-flex';
                        $('#btnDownloadUpscaled').style.display = 'none';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }

            function upscaleImage() {
                if (!state.originalImage) return toast('Upload an image first.', 'error');
                const btn = $('#btnUpscale');
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Upscaling...';
                const img = new Image();
                img.onload = function () {
                    const targetLong = 3840;
                    const ratio = img.width / img.height;
                    let w, h;
                    if (ratio >= 1) { w = targetLong; h = Math.round(targetLong / ratio); }
                    else { h = targetLong; w = Math.round(targetLong * ratio); }
                    if (w < 800) w = 800; if (h < 600) h = 600;
                    const upscaledDataUrl = stepwiseUpscale(img, w, h);
                    state.upscaled = { src: upscaledDataUrl, width: w, height: h };
                    $('#upscaledImage').src = upscaledDataUrl;
                    $('#upscaledRes').textContent = `${w} × ${h} px (4K)`;
                    $('#btnDownloadUpscaled').style.display = 'inline-flex';
                    btn.style.display = 'none';
                    toast(`Upscaled to ${w}×${h}!`, 'success');
                };
                img.src = state.originalImage.src;
            }

            function stepwiseUpscale(img, tw, th) {
                let cw = img.width, ch = img.height;
                const maxScale = Math.max(tw / cw, th / ch);
                const steps = Math.ceil(Math.log(maxScale) / Math.log(1.8));
                const scalePerStep = Math.pow(maxScale, 1 / steps);
                let srcCanvas = document.createElement('canvas');
                srcCanvas.width = cw; srcCanvas.height = ch;
                let ctx = srcCanvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0, cw, ch);
                for (let i = 0; i < steps; i++) {
                    let nw, nh;
                    if (i === steps - 1) { nw = tw; nh = th; }
                    else { nw = Math.round(cw * scalePerStep); nh = Math.round(ch * scalePerStep); }
                    const nextCanvas = document.createElement('canvas');
                    nextCanvas.width = nw; nextCanvas.height = nh;
                    const nctx = nextCanvas.getContext('2d');
                    nctx.imageSmoothingEnabled = true;
                    nctx.imageSmoothingQuality = 'high';
                    nctx.drawImage(srcCanvas, 0, 0, cw, ch, 0, 0, nw, nh);
                    srcCanvas = nextCanvas; cw = nw; ch = nh;
                }
                // Light sharpen
                const imgData = srcCanvas.getContext('2d').getImageData(0, 0, cw, ch);
                const d = imgData.data;
                const kernel = [0, -0.4, 0, -0.4, 2.6, -0.4, 0, -0.4, 0];
                const out = new Uint8ClampedArray(d);
                for (let y = 1; y < ch - 1; y++) {
                    for (let x = 1; x < cw - 1; x++) {
                        const idx = (y * cw + x) * 4;
                        for (let c = 0; c < 3; c++) {
                            let sum = 0;
                            for (let ky = -1; ky <= 1; ky++)
                                for (let kx = -1; kx <= 1; kx++)
                                    sum += d[((y + ky) * cw + (x + kx)) * 4 + c] * kernel[(ky + 1) * 3 + (kx + 1)];
                            out[idx + c] = Math.max(0, Math.min(255, sum));
                        }
                        out[idx + 3] = 255;
                    }
                }
                const resultCanvas = document.createElement('canvas');
                resultCanvas.width = cw; resultCanvas.height = ch;
                resultCanvas.getContext('2d').putImageData(new ImageData(out, cw, ch), 0, 0);
                return resultCanvas.toDataURL('image/jpeg', 0.92);
            }

            function downloadUpscaled() {
                if (!state.upscaled) return toast('Upscale first.', 'error');
                const a = document.createElement('a');
                a.href = state.upscaled.src;
                a.download = `upscaled_4k_${state.upscaled.width}x${state.upscaled.height}.jpg`;
                a.click();
                toast('4K image saved!', 'success');
            }

            function clearImage() {
                state.originalImage = null;
                state.upscaled = null;
                $('#originalImage').src = '';
                $('#upscaledImage').src = '';
                $('#originalRes').textContent = '';
                $('#upscaledRes').textContent = '';
                $('#imagePreviewArea').style.display = 'none';
                $('#dropZone').style.display = '';
                $('#btnUpscale').style.display = 'inline-flex';
                $('#btnDownloadUpscaled').style.display = 'none';
                document.getElementById('imageInput').value = '';
                $('#btnUpscale').disabled = false;
                $('#btnUpscale').innerHTML = '🚀 Upscale to 4K';
            }

            // Expose upscaler functions
            window.upscaleImage = upscaleImage;
            window.downloadUpscaled = downloadUpscaled;
            window.clearImage = clearImage;

            // Start
            switchPlatform('youtube');
        })();
    </script>
</body>
