<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOCIAL MEDIA LINK-CONVERTER</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #14141f;
            --surface2: #1a1a2e;
            --surface3: #1e1e32;
            --accent: #6c5ce7;
            --accent2: #a855f7;
            --accent3: #6366f1;
            --text: #e2e2f0;
            --text2: #b0b0c8;
            --text3: #8888a8;
            --border: #2a2a40;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --yt: #ff0033;
            --fb: #1877f2;
            --tt: #ff0050;
            --gradient1: linear-gradient(135deg, #6c5ce7, #a855f7);
            --gradient2: linear-gradient(135deg, #6366f1, #8b5cf6);
            --shadow-lg: 0 25px 60px rgba(0, 0, 0, 0.5);
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.4);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 20%, rgba(108, 92, 231, 0.06) 0%, transparent 55%),
                        radial-gradient(ellipse at 70% 60%, rgba(168, 85, 247, 0.05) 0%, transparent 55%),
                        radial-gradient(ellipse at 40% 80%, rgba(99, 102, 241, 0.04) 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 10%, rgba(255, 0, 80, 0.03) 0%, transparent 55%);
            z-index: 0; pointer-events: none;
            animation: bgShift 20s ease-in-out infinite;
        }
        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(1%, -1%); }
            50% { transform: translate(-0.5%, 1.5%); }
            75% { transform: translate(1.5%, 0.5%); }
        }
        .container {
            position: relative; z-index: 1;
            max-width: 900px; margin: 0 auto; padding: 20px 20px 40px;
        }
        .header { text-align: center; padding: 30px 20px 20px; }
        .header .logo {
            font-size: 2.4rem; font-weight: 800;
            background: var(--gradient1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; letter-spacing: -1px; margin-bottom: 4px;
        }
        .header .tagline { font-size: 0.95rem; color: var(--text3); letter-spacing: 0.5px; }
        .platform-selector { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 20px 0 24px; }
        .platform-btn {
            display: flex; align-items: center; gap: 10px; padding: 14px 24px;
            border-radius: 50px; border: 2px solid var(--border); background: var(--surface2);
            color: var(--text2); cursor: pointer; font-size: 1rem; font-weight: 600;
            transition: var(--transition); white-space: nowrap; letter-spacing: 0.3px;
        }
        .platform-btn:hover { border-color: var(--accent); color: #fff; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108, 92, 231, 0.25); }
        .platform-btn.active { border-color: transparent; color: #fff; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108, 92, 231, 0.35); }
        .platform-btn.active.yt-active { background: var(--yt); }
        .platform-btn.active.fb-active { background: var(--fb); }
        .platform-btn.active.tt-active { background: var(--tt); }
        .platform-btn .icon { font-size: 1.4rem; }
        .platform-btn .badge { font-size: 0.7rem; background: rgba(255,255,255,0.2); padding: 3px 8px; border-radius: 20px; text-transform: uppercase; }
        .main-card {
            background: var(--surface); border-radius: var(--radius-lg); padding: 30px 28px;
            box-shadow: var(--shadow-lg); border: 1px solid var(--border); margin-bottom: 28px;
        }
        .section-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .section-title .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot {
            0%,100% { box-shadow: 0 0 0 0 rgba(108,92,231,0.6); }
            50% { box-shadow: 0 0 0 12px rgba(108,92,231,0); }
        }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .input-group input {
            flex: 1; min-width: 250px; padding: 14px 18px; border-radius: 50px;
            border: 2px solid var(--border); background: var(--surface2); color: var(--text);
            font-size: 0.95rem; transition: var(--transition); outline: none;
        }
        .input-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(108,92,231,0.1); }
        .input-group input::placeholder { color: var(--text3); }
        .btn {
            padding: 14px 28px; border-radius: 50px; border: none; cursor: pointer;
            font-weight: 700; font-size: 0.95rem; letter-spacing: 0.3px; transition: var(--transition);
            display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
        }
        .btn-primary { background: var(--gradient1); color: #fff; box-shadow: 0 6px 20px rgba(108,92,231,0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(108,92,231,0.45); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-download { background: var(--success); color: #000; font-weight: 700; box-shadow: 0 6px 20px rgba(34,197,94,0.3); }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(34,197,94,0.45); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--accent); color: #fff; }
        .btn-sm { padding: 10px 18px; font-size: 0.85rem; border-radius: 40px; }
        .format-selector { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
        .format-option {
            padding: 10px 18px; border-radius: 40px; border: 2px solid var(--border);
            background: var(--surface2); color: var(--text2); cursor: pointer;
            font-weight: 600; font-size: 0.9rem; transition: var(--transition);
        }
        .format-option:hover { border-color: var(--accent); color: #fff; }
        .format-option.selected { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(108,92,231,0.35); }
        .quality-tag { font-size: 0.7rem; opacity: 0.8; margin-left: 4px; }
        .result-area { margin-top: 20px; display: none; animation: fadeInUp 0.4s ease; }
        .result-area.show { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .preview-card {
            background: var(--surface2); border-radius: var(--radius-md); padding: 20px;
            border: 1px solid var(--border); display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
        }
        .preview-thumb { width: 160px; height: 90px; border-radius: var(--radius-sm); object-fit: cover; background: var(--surface3); flex-shrink: 0; }
        .preview-info { flex: 1; min-width: 180px; }
        .preview-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; color: #fff; word-break: break-word; }
        .preview-info .meta { font-size: 0.8rem; color: var(--text3); }
        .download-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .progress-bar-wrap { height: 6px; background: var(--surface3); border-radius: 20px; margin: 16px 0; overflow: hidden; display: none; }
        .progress-bar-wrap.active { display: block; }
        .progress-bar-fill { height: 100%; background: var(--gradient1); border-radius: 20px; width: 0%; transition: width 0.5s ease; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast {
            padding: 14px 20px; border-radius: 50px; color: #fff; font-weight: 600; font-size: 0.9rem;
            animation: slideInRight 0.3s ease, fadeOutRight 0.3s ease 3.5s forwards;
            box-shadow: var(--shadow-md); max-width: 400px;
        }
        .toast.success { background: #16a34a; }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--accent3); }
        @keyframes slideInRight { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
        .upscaler-section { background: var(--surface); border-radius: var(--radius-lg); padding: 30px 28px; box-shadow: var(--shadow-lg); border: 1px solid var(--border); }
        .drop-zone {
            border: 3px dashed var(--border); border-radius: var(--radius-md); padding: 50px 30px;
            text-align: center; cursor: pointer; transition: var(--transition); background: var(--surface2);
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(108,92,231,0.05); box-shadow: 0 0 40px rgba(108,92,231,0.1); }
        .drop-zone .drop-icon { font-size: 4rem; margin-bottom: 12px; }
        .drop-zone p { color: var(--text2); font-weight: 500; }
        .drop-zone .sub { font-size: 0.8rem; color: var(--text3); margin-top: 4px; }
        .drop-zone input { display: none; }
        .image-preview-area { display: none; margin-top: 20px; animation: fadeInUp 0.4s ease; }
        .image-preview-area.show { display: block; }
        .image-compare { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .image-box { flex: 1; min-width: 250px; max-width: 420px; background: var(--surface2); border-radius: var(--radius-md); padding: 14px; text-align: center; border: 1px solid var(--border); }
        .image-box img { max-width: 100%; border-radius: var(--radius-sm); max-height: 350px; object-fit: contain; }
        .image-box .label { font-weight: 700; font-size: 0.85rem; margin-bottom: 8px; color: var(--text2); text-transform: uppercase; }
        .image-box .resolution { font-size: 0.75rem; color: var(--text3); margin-top: 6px; }
        .upscale-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 640px) {
            .header .logo { font-size: 1.7rem; }
            .platform-btn { padding: 11px 16px; font-size: 0.85rem; gap: 6px; }
            .main-card, .upscaler-section { padding: 20px 16px; border-radius: var(--radius-md); }
            .input-group input { min-width: 100%; font-size: 0.9rem; padding: 12px 16px; }
            .btn { padding: 12px 20px; font-size: 0.85rem; }
            .preview-thumb { width: 100%; height: 180px; }
            .preview-card { flex-direction: column; align-items: stretch; }
            .image-compare { flex-direction: column; align-items: center; }
            .image-box { max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡ MediaForge Pro</div>
            <div class="tagline">Video Converter &bull; 4K Image Upscaler</div>
        </div>
        <div class="platform-selector">
            <button class="platform-btn active yt-active" data-platform="youtube" id="btnYt">
                <span class="icon"></span> YouTube <span class="badge">MP4/MP3</span>
            </button>
            <button class="platform-btn" data-platform="facebook" id="btnFb">
                <span class="icon"></span> Facebook <span class="badge">MP4</span>
            </button>
            <button class="platform-btn" data-platform="tiktok" id="btnTt">
                <span class="icon"></span> TikTok <span class="badge">MP4</span>
            </button>
        </div>
        <div class="main-card">
            <div class="section-title"><span class="dot"></span> <span id="converterTitle">YouTube Video Converter</span></div>
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="Paste your YouTube video link here...">
                <button class="btn btn-primary" id="btnFetch">Fetch Info</button>
            </div>
            <div class="format-selector" id="formatSelector">
                <button class="format-option selected" data-format="mp4">MP4 <span class="quality-tag">Video</span></button>
                <button class="format-option" data-format="mp3">MP3 <span class="quality-tag">Audio</span></button>
                <button class="format-option" data-format="mp4_hd">MP4 HD <span class="quality-tag">1080p</span></button>
            </div>
            <div class="progress-bar-wrap" id="progressBar"><div class="progress-bar-fill" id="progressFill"></div></div>
            <div class="result-area" id="resultArea">
                <div class="preview-card">
                    <img class="preview-thumb" id="previewThumb" src="" alt="Preview">
                    <div class="preview-info">
                        <h3 id="previewTitle">Video Title</h3>
                        <p class="meta" id="previewMeta">Duration: -- | Quality: --</p>
                        <div class="download-btns">
                            <button class="btn btn-download" id="btnDownload">Download</button>
                            <button class="btn btn-outline btn-sm" id="btnClearResult">✕ Clear</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="upscaler-section">
            <div class="section-title"><span class="dot"></span> Image Upscaler to 4K</div>
            <div class="drop-zone" id="dropZone">
                <div class="drop-icon">📤</div>
                <p><strong>Click to upload</strong> or drag & drop an image</p>
                <p class="sub">Supports JPG, PNG, WebP — Upscales to 4K resolution</p>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="image-preview-area" id="imagePreviewArea">
                <div class="image-compare">
                    <div class="image-box">
                        <div class="label">Original</div>
                        <img id="originalImage" src="" alt="Original">
                        <div class="resolution" id="originalRes"></div>
                    </div>
                    <div class="image-box">
                        <div class="label">Upscaled (4K)</div>
                        <img id="upscaledImage" src="" alt="Upscaled">
                        <div class="resolution" id="upscaledRes"></div>
                    </div>
                </div>
                <div class="upscale-actions">
                    <button class="btn btn-primary" id="btnUpscale">Upscale to 4K</button>
                    <button class="btn btn-download" id="btnDownloadUpscaled" style="display:none;">Download 4K Image</button>
                    <button class="btn btn-outline btn-sm" id="btnClearImage">✕ Clear</button>
                </div>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script>
        (function() {
            // ==================== STATE ====================
            const state = {
                platform: 'youtube',
                format: 'mp4',
                videoInfo: null,
                directUrl: null,
                originalImageData: null,
                upscaledImageData: null,
                isProcessing: false,
            };
            const BACKEND = 'https://backend-eiwm.onrender.com';

            // ==================== DOM ====================
            const $ = (s) => document.querySelector(s);
            const dom = {
                btnYt: $('#btnYt'), btnFb: $('#btnFb'), btnTt: $('#btnTt'),
                converterTitle: $('#converterTitle'), videoUrl: $('#videoUrl'), btnFetch: $('#btnFetch'),
                formatSelector: $('#formatSelector'), resultArea: $('#resultArea'),
                previewThumb: $('#previewThumb'), previewTitle: $('#previewTitle'),
                previewMeta: $('#previewMeta'), btnDownload: $('#btnDownload'),
                btnClearResult: $('#btnClearResult'), progressBar: $('#progressBar'),
                progressFill: $('#progressFill'), dropZone: $('#dropZone'),
                imageInput: $('#imageInput'), imagePreviewArea: $('#imagePreviewArea'),
                originalImage: $('#originalImage'), upscaledImage: $('#upscaledImage'),
                originalRes: $('#originalRes'), upscaledRes: $('#upscaledRes'),
                btnUpscale: $('#btnUpscale'), btnDownloadUpscaled: $('#btnDownloadUpscaled'),
                btnClearImage: $('#btnClearImage'), toastContainer: $('#toastContainer'),
            };

            // ==================== TOAST ====================
            function showToast(msg, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = msg;
                dom.toastContainer.appendChild(toast);
                setTimeout(() => toast.remove(), 3800);
            }

            // ==================== PLATFORM SWITCH ====================
            function switchPlatform(platform) {
                state.platform = platform;
                state.videoInfo = null;
                state.directUrl = null;
                state.format = platform === 'youtube' ? 'mp4' : 'mp4';
                clearResult(false);

                [dom.btnYt, dom.btnFb, dom.btnTt].forEach(b => b.classList.remove('active', 'yt-active', 'fb-active', 'tt-active'));
                if (platform === 'youtube') {
                    dom.btnYt.classList.add('active', 'yt-active');
                    dom.formatSelector.style.display = 'flex';
                    setFormatButtons('mp4');
                } else if (platform === 'facebook') {
                    dom.btnFb.classList.add('active', 'fb-active');
                    dom.formatSelector.style.display = 'none';
                    state.format = 'mp4';
                } else {
                    dom.btnTt.classList.add('active', 'tt-active');
                    dom.formatSelector.style.display = 'none';
                    state.format = 'mp4';
                }
                dom.converterTitle.textContent = {
                    youtube: 'YouTube Video Converter',
                    facebook: 'Facebook Video Converter',
                    tiktok: 'TikTok Video Converter',
                }[platform];
                dom.videoUrl.placeholder = {
                    youtube: 'Paste your YouTube video link here...',
                    facebook: 'Paste your Facebook video link here...',
                    tiktok: 'Paste your TikTok video link here...',
                }[platform];
                dom.resultArea.classList.remove('show');
                dom.videoUrl.value = '';
                dom.videoUrl.focus();
            }

            function setFormatButtons(format) {
                document.querySelectorAll('.format-option').forEach(f => f.classList.remove('selected'));
                const btn = document.querySelector(`.format-option[data-format="${format}"]`);
                if (btn) btn.classList.add('selected');
                state.format = format;
            }

            dom.btnYt.addEventListener('click', () => switchPlatform('youtube'));
            dom.btnFb.addEventListener('click', () => switchPlatform('facebook'));
            dom.btnTt.addEventListener('click', () => switchPlatform('tiktok'));

            document.querySelectorAll('.format-option').forEach(btn => {
                btn.addEventListener('click', () => {
                    setFormatButtons(btn.dataset.format);
                    if (state.videoInfo) fetchVideoInfo(); // re-fetch with new format
                });
            });

            // ==================== PROGRESS ====================
            function setProgress(percent) {
                dom.progressBar.classList.add('active');
                dom.progressFill.style.width = percent + '%';
                if (percent >= 100) setTimeout(() => {
                    dom.progressBar.classList.remove('active');
                    dom.progressFill.style.width = '0%';
                }, 700);
            }

            // ==================== FETCH & DOWNLOAD (BACKEND) ====================
           async function fetchVideoInfo() {
    const url = dom.videoUrl.value.trim();
    if (!url) return showToast('Paste a link first.', 'error');

    // Auto-detect platform
    if (/youtube\.com|youtu\.be/.test(url)) switchPlatform('youtube');
    else if (/facebook\.com|fb\.watch/.test(url)) switchPlatform('facebook');
    else if (/tiktok\.com/.test(url)) switchPlatform('tiktok');
    else return showToast('Unsupported URL.', 'error');

    state.videoInfo = null;
    state.directUrl = null;
    dom.resultArea.classList.remove('show');
    dom.btnFetch.disabled = true;
    dom.btnFetch.innerHTML = '<span class="spinner"></span> Fetching...';
    setProgress(20);

    try {
        // ----- YOUTUBE: use Invidious fallback -----
        if (state.platform === 'youtube') {
    const resp = await fetch(`${BACKEND}/api/youtube?url=${encodeURIComponent(url)}`);
    if (!resp.ok) throw new Error((await resp.json()).error);
    const data = await resp.json();
    state.videoInfo = { title: data.title, thumbnail: data.thumbnail };
    state.directUrl = data.downloadUrl;
    setProgress(80);



}
        // ----- TIKTOK: use tikwm.com -----
        else if (state.platform === 'tiktok') {
            const resp = await fetch(`${BACKEND}/api/tiktok?url=${encodeURIComponent(url)}`);
            if (!resp.ok) throw new Error((await resp.json()).error);
            const data = await resp.json();
            state.videoInfo = {
                title: data.title,
                thumbnail: data.thumbnail,
                duration: data.duration,
                author: data.author,
            };
            state.directUrl = data.downloadUrl;
            setProgress(80);
        }
        // ----- FACEBOOK: use yt-dlp -----
        else {
            const infoUrl = `${BACKEND}/api/info?url=${encodeURIComponent(url)}&format=${state.format}`;
            const infoResp = await fetch(infoUrl);
            if (!infoResp.ok) throw new Error((await infoResp.json()).error);
            const infoData = await infoResp.json();
            state.videoInfo = infoData;
            setProgress(60);

            const dlUrl = `${BACKEND}/api/download?url=${encodeURIComponent(url)}&formatId=${infoData.formatId}`;
            const dlResp = await fetch(dlUrl);
            if (!dlResp.ok) throw new Error((await dlResp.json()).error);
            const dlData = await dlResp.json();
            state.directUrl = dlData.downloadUrl;
            setProgress(90);
        }

        // Update UI
        dom.previewThumb.src = state.videoInfo.thumbnail || '';
        dom.previewTitle.textContent = state.videoInfo.title || 'Video';
        let meta = `Format: ${state.format === 'mp3' ? 'MP3' : 'MP4'}`;
        if (state.videoInfo.duration) meta += ` | Duration: ${state.videoInfo.duration}`;
        if (state.videoInfo.author) meta += ` | @${state.videoInfo.author}`;
        dom.previewMeta.textContent = meta;
        dom.resultArea.classList.add('show');
        dom.btnDownload.textContent = state.format === 'mp3' ? '⬇️ Download MP3' : '⬇️ Download MP4';
        showToast('Ready! Click Download.', 'success');
        setProgress(100);
    } catch (err) {
        showToast(err.message, 'error');
        setProgress(0);
    } finally {
        dom.btnFetch.disabled = false;
        dom.btnFetch.innerHTML = '🔍 Fetch Info';
    }
}
      async function downloadMedia() {
    if (!state.directUrl) return showToast('Fetch info first.', 'error');
    dom.btnDownload.disabled = true;
    dom.btnDownload.innerHTML = '<span class="spinner"></span> Downloading...';
    try {
        const ext = state.format === 'mp3' ? 'mp3' : 'mp4';
        const title = (state.videoInfo?.title || 'video').substring(0, 60);
        const proxyUrl = `${BACKEND}/api/proxy-download?url=${encodeURIComponent(state.directUrl)}&title=${encodeURIComponent(title)}&ext=${ext}`;
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = proxyUrl;
        document.body.appendChild(iframe);
        setTimeout(() => document.body.removeChild(iframe), 5000);
        showToast('Download started! ✅', 'success');
    } catch (err) {
        window.open(state.directUrl, '_blank');
        showToast('Opening in new tab...', 'info');
    } finally {
        dom.btnDownload.disabled = false;
        dom.btnDownload.innerHTML = state.format === 'mp3' ? '⬇️ Download MP3' : '⬇️ Download MP4';
    }
}

            function clearResult(clearInput = true) {
                state.videoInfo = null;
                state.directUrl = null;
                dom.resultArea.classList.remove('show');
                dom.previewThumb.src = '';
                dom.previewTitle.textContent = 'Video Title';
                dom.previewMeta.textContent = 'Duration: -- | Quality: --';
                dom.btnDownload.textContent = '⬇️ Download';
                dom.btnDownload.disabled = false;
                if (clearInput) dom.videoUrl.value = '';
                dom.progressBar.classList.remove('active');
                dom.progressFill.style.width = '0%';
            }

            dom.btnFetch.addEventListener('click', fetchVideoInfo);
            dom.btnDownload.addEventListener('click', downloadMedia);

            // ==================== AI IMAGE UPSCALER ====================

let upscaler = null;
let modelLoading = false;

async function loadUpscaler() {
    if (upscaler) return upscaler;
    if (modelLoading) {
        // Wait for the first load attempt
        await new Promise((resolve) => {
            const check = setInterval(() => {
                if (upscaler || !modelLoading) {
                    clearInterval(check);
                    resolve();
                }
            }, 200);
        });
        return upscaler;
    }

    modelLoading = true;
    showToast('Loading AI model... (first time may take a few seconds)', 'info');
    dom.btnUpscale.disabled = true;
    dom.btnUpscale.innerHTML = '<span class="spinner"></span> Loading model...';

    try {
        // Initialize upscaler with ESRGAN medium (4x upscale factor)
        const { ESRGAN } = window;
        // The package exposes a class; we need to create an instance
        // In the UMD build, the constructor is available as `ESRGAN`
        upscaler = new ESRGAN({
            // You can adjust patchSize and padding if you hit memory limits
            patchSize: 128,
            padding: 4,
            progress: (p) => {
                // p is a number between 0 and 1, but we don't show continuous progress here
            },
        });
        await upscaler.load();
        showToast('AI model ready!', 'success');
    } catch (err) {
        console.error('Failed to load AI model:', err);
        showToast('Could not load AI model. Using basic upscaler.', 'error');
        upscaler = null; // will fall back to stepwise
    } finally {
        modelLoading = false;
        dom.btnUpscale.disabled = false;
        dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
    }
}

async function upscaleImage() {
    if (!state.originalImageData) {
        showToast('Please upload an image first.', 'error');
        return;
    }
    if (state.isProcessing) return;

    // Load AI model if not loaded yet
    if (!upscaler) {
        await loadUpscaler();
        if (!upscaler) {
            // Fallback to old stepwise method if model failed
            oldUpscaleImage(); // we'll rename the old function
            return;
        }
    }

    state.isProcessing = true;
    dom.btnUpscale.disabled = true;
    dom.btnUpscale.innerHTML = '<span class="spinner"></span> Upscaling...';

    try {
        const img = new Image();
        img.src = state.originalImageData.src;
        await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
        });

        // Determine target size: 4K on longest side
        const MAX_LONG = 3840;
        const origW = img.width, origH = img.height;
        const aspect = origW / origH;

        let targetW, targetH;
        if (aspect >= 1) {
            targetW = MAX_LONG;
            targetH = Math.round(MAX_LONG / aspect);
        } else {
            targetH = MAX_LONG;
            targetW = Math.round(MAX_LONG * aspect);
        }

        // Upscale factor: we can request 2x, 3x, or 4x from the model.
        // Calculate the needed factor to reach at least the target.
        const scaleX = targetW / origW;
        const scaleY = targetH / origH;
        const requiredScale = Math.max(scaleX, scaleY);
        let upscaleFactor;
        if (requiredScale <= 2) upscaleFactor = 2;
        else if (requiredScale <= 3) upscaleFactor = 3;
        else upscaleFactor = 4;

        // AI upscale
        const upscaledCanvas = await upscaler.upscale(img, {
            output: 'canvas',
            pixelRatio: upscaleFactor,  // this is the scale factor
        });

        // If the upscaled image is larger than target, resize down with canvas
        let finalCanvas = upscaledCanvas;
        if (upscaledCanvas.width > targetW || upscaledCanvas.height > targetH) {
            finalCanvas = document.createElement('canvas');
            finalCanvas.width = targetW;
            finalCanvas.height = targetH;
            const ctx = finalCanvas.getContext('2d');
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(upscaledCanvas, 0, 0, targetW, targetH);
        }

        // Convert to data URL
        const resultDataUrl = finalCanvas.toDataURL('image/jpeg', 0.92);
        state.upscaledImageData = {
            src: resultDataUrl,
            width: finalCanvas.width,
            height: finalCanvas.height,
        };

        dom.upscaledImage.src = resultDataUrl;
        dom.upscaledRes.textContent = `Resolution: ${finalCanvas.width} × ${finalCanvas.height} px (4K AI Enhanced)`;
        dom.btnDownloadUpscaled.style.display = 'inline-flex';
        dom.btnUpscale.style.display = 'none';
        showToast(`AI upscaled to ${finalCanvas.width}×${finalCanvas.height}! 🎉`, 'success');
    } catch (err) {
        console.error('Upscale error:', err);
        showToast('Upscaling failed. Falling back to basic method.', 'error');
        // Fallback to old stepwise method
        oldUpscaleImage();
    } finally {
        state.isProcessing = false;
        dom.btnUpscale.disabled = false;
        dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
    }
}

// Rename the old stepwise function as fallback
function oldUpscaleImage() {
    if (!state.originalImageData) {
        showToast('Please upload an image first.', 'error');
        return;
    }
    if (state.isProcessing) return;
    state.isProcessing = true;
    dom.btnUpscale.disabled = true;
    dom.btnUpscale.innerHTML = '<span class="spinner"></span> Upscaling...';
    setTimeout(() => {
        try {
            const img = new Image();
            img.onload = function() {
                const TARGET_LONG_SIDE = 3840;
                const origW = img.width, origH = img.height;
                const aspectRatio = origW / origH;
                let targetW, targetH;
                if (aspectRatio >= 1) {
                    targetW = TARGET_LONG_SIDE;
                    targetH = Math.round(TARGET_LONG_SIDE / aspectRatio);
                } else {
                    targetH = TARGET_LONG_SIDE;
                    targetW = Math.round(TARGET_LONG_SIDE * aspectRatio);
                }
                if (targetW < 800) targetW = 800;
                if (targetH < 600) targetH = 600;
                const upscaledDataUrl = stepwiseUpscale(img, targetW, targetH);
                state.upscaledImageData = { src: upscaledDataUrl, width: targetW, height: targetH };
                dom.upscaledImage.src = upscaledDataUrl;
                dom.upscaledRes.textContent = `Resolution: ${targetW} × ${targetH} px (Basic Upscale)`;
                dom.btnDownloadUpscaled.style.display = 'inline-flex';
                dom.btnUpscale.style.display = 'none';
                showToast(`Image upscaled to ${targetW}×${targetH}!`, 'success');
                state.isProcessing = false;
                dom.btnUpscale.disabled = false;
                dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
            };
            img.onerror = function() {
                showToast('Error processing image.', 'error');
                state.isProcessing = false;
                dom.btnUpscale.disabled = false;
                dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
            };
            img.src = state.originalImageData.src;
        } catch (err) {
            showToast('Upscaling failed.', 'error');
            state.isProcessing = false;
            dom.btnUpscale.disabled = false;
            dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
        }
    }, 100);
}



            function stepwiseUpscale(img, w, h) {
                const MAX = 1.8;
                let cw = img.width, ch = img.height;
                const scale = Math.max(w / cw, h / ch);
                const steps = Math.max(1, Math.ceil(Math.log(scale) / Math.log(MAX)));
                const stepScale = Math.pow(scale, 1 / steps);
                let srcCanvas = document.createElement('canvas');
                srcCanvas.width = cw; srcCanvas.height = ch;
                const ctx = srcCanvas.getContext('2d');
                ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(img, 0, 0);
                for (let i = 0; i < steps; i++) {
                    let nw, nh;
                    if (i === steps - 1) { nw = w; nh = h; }
                    else { nw = Math.round(cw * stepScale); nh = Math.round(ch * stepScale); }
                    const next = document.createElement('canvas');
                    next.width = nw; next.height = nh;
                    const nctx = next.getContext('2d');
                    nctx.imageSmoothingEnabled = true; nctx.imageSmoothingQuality = 'high';
                    nctx.drawImage(srcCanvas, 0, 0, cw, ch, 0, 0, nw, nh);
                    srcCanvas = next; cw = nw; ch = nh;
                }
                const sharp = applySharpen(srcCanvas);
                return sharp.toDataURL('image/jpeg', 0.92);
            }

            function applySharpen(canvas) {
                const ctx = canvas.getContext('2d');
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const d = imgData.data, w = canvas.width, h = canvas.height;
                const out = new Uint8ClampedArray(d);
                const k = [0,-0.4,0, -0.4,2.6,-0.4, 0,-0.4,0];
                for (let y = 1; y < h-1; y++) {
                    for (let x = 1; x < w-1; x++) {
                        const idx = (y*w + x)*4;
                        for (let c = 0; c < 3; c++) {
                            let s = 0;
                            for (let ky = -1; ky <= 1; ky++)
                                for (let kx = -1; kx <= 1; kx++)
                                    s += d[((y+ky)*w + (x+kx))*4 + c] * k[(ky+1)*3 + (kx+1)];
                            out[idx+c] = Math.min(255, Math.max(0, s));
                        }
                    }
                }
                const outImg = new ImageData(out, w, h);
                const resCanvas = document.createElement('canvas');
                resCanvas.width = w; resCanvas.height = h;
                resCanvas.getContext('2d').putImageData(outImg, 0, 0);
                return resCanvas;
            }

            dom.btnDownloadUpscaled.addEventListener('click', () => {
                if (!state.upscaledImageData) return showToast('Upscale first.', 'error');
                const a = document.createElement('a');
                a.href = state.upscaledImageData.src;
                a.download = `upscaled_4k_${state.upscaledImageData.width}x${state.upscaledImageData.height}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                showToast('4K image downloaded!', 'success');
            });

            dom.btnClearImage.addEventListener('click', () => {
                state.originalImageData = null;
                state.upscaledImageData = null;
                dom.originalImage.src = ''; dom.upscaledImage.src = '';
                dom.originalRes.textContent = ''; dom.upscaledRes.textContent = '';
                dom.imagePreviewArea.classList.remove('show');
                dom.dropZone.style.display = '';
                dom.btnUpscale.style.display = 'inline-flex';
                dom.btnDownloadUpscaled.style.display = 'none';
                dom.imageInput.value = '';
                state.isProcessing = false;
                dom.btnUpscale.disabled = false;
                dom.btnUpscale.innerHTML = '🚀 Upscale to 4K';
            });

            // Init
            switchPlatform('youtube');
        })();
